qdrant:
  host: "qdrant"
  port: 6333
  timeout: 120
  check_compatibility: false
  api_key: "QDRANT_API_KEY"

collection:
  name: "documents"

model:
  embedding: "BAAI/bge-m3"
  reranker: "BAAI/bge-reranker-v2-m3"

indexing:
  batch_size: 5
  documents_path: "documents"

search:
  limit: 3
  candidate_multiplier: 10
  min_candidates: 80
  scroll_limit_per_doc: 10000
  window_radius: 5
  full_document_chunk_threshold: 15

  aggregation_top_k: 3
  aggregation_max_weight: 0.8 # poids du score max
  aggregation_mean_weight: 0.2 # poids de la moyenne des top_k
