qdrant:
  host: "qdrant"
  port: 6333
  timeout: 120
  check_compatibility: false
  api_key: "QDRANT_API_KEY"

collection:
  name: "documents"

model:
  embedding: "BAAI/bge-m3"
  reranker: "BAAI/bge-reranker-v2-m3"

indexing:
  batch_size: 5
  documents_path: "documents"

search:
  limit: 3
  candidate_multiplier: 8
  min_candidates: 50
  scroll_limit_per_doc: 10000
  window_radius: 4
  full_document_chunk_threshold: 12
