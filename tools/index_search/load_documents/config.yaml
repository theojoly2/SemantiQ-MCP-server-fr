qdrant:
  host: "qdrant"
  port: 6333
  timeout: 120
  check_compatibility: false
  api_key: "QDRANT_API_KEY"

collection:
  name: "documents_llm"

model:
  embedding: "BAAI/bge-m3"
  reranker: "BAAI/bge-reranker-v2-m3"

indexing:
  batch_size: 5
  documents_path: "documents"

search:
  limit: 3
  candidate_multiplier: 8
  min_candidates: 250
  scroll_limit_per_doc: 10000
  window_radius: 5
  full_document_chunk_threshold: 15
  rerank_pool_size: 80
  hybrid_dense_weight: 0.7

  aggregation_top_k: 3
  aggregation_max_weight: 0.9 # poids du score max
  aggregation_mean_weight: 0.1 # poids de la moyenne des top_k
  max_chunks_per_document: 3
